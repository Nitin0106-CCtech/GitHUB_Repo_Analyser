<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Repo Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d0f12;
    --bg2:      #13161b;
    --bg3:      #1a1e25;
    --border:   #252a33;
    --border2:  #2e3540;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --dim:      #334155;
    --accent:   #6ee7b7;
    --accent2:  #818cf8;
    --warn:     #fbbf24;
    --danger:   #f87171;
    --safe:     #34d399;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
    --radius:   8px;
    --radius-lg: 12px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 0;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
  }

  .logo-mark {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--accent); font-weight: 700;
    font-family: var(--sans);
    flex-shrink: 0;
  }

  .logo-text { font-family: var(--sans); font-size: 18px; font-weight: 700; color: var(--text); }
  .logo-sub  { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--mono); }

  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .version-pill {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border2); color: var(--muted);
    font-family: var(--mono); letter-spacing: 0.05em;
  }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 77px);
  }

  /* ── Sidebar ── */
  aside {
    border-right: 1px solid var(--border);
    background: var(--bg2);
    padding: 24px 0;
  }

  .sidebar-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); padding: 0 20px 10px; font-family: var(--mono);
  }

  .tool-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 11px 20px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: var(--mono); font-size: 12.5px;
    text-align: left; transition: all 0.15s; position: relative;
  }
  .tool-btn:hover { background: var(--bg3); color: var(--text); }
  .tool-btn.active {
    background: var(--bg3); color: var(--accent);
    border-right: 2px solid var(--accent);
  }
  .tool-btn .tool-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    border: 1px solid var(--border2);
  }
  .tool-btn.active .tool-icon { border-color: var(--accent); color: var(--accent); }

  /* ── Main ── */
  main { padding: 32px; overflow-y: auto; }

  /* ── Search bar ── */
  .search-bar {
    display: flex; gap: 8px; margin-bottom: 28px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: var(--radius-lg); padding: 6px 6px 6px 16px;
    transition: border-color 0.2s;
  }
  .search-bar:focus-within { border-color: var(--accent); }

  .repo-prefix {
    color: var(--muted); font-family: var(--mono); font-size: 14px;
    display: flex; align-items: center; white-space: nowrap; flex-shrink: 0;
  }
  .repo-prefix span { color: var(--accent); }

  #repo-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--mono); font-size: 14px;
    padding: 4px 0;
  }
  #repo-input::placeholder { color: var(--dim); }

  .run-btn {
    background: var(--accent); color: #0d0f12; border: none;
    padding: 8px 20px; border-radius: var(--radius); cursor: pointer;
    font-family: var(--sans); font-weight: 700; font-size: 13px;
    letter-spacing: 0.03em; white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .run-btn:hover { opacity: 0.9; }
  .run-btn:active { transform: scale(0.97); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Tool header ── */
  .tool-header { margin-bottom: 24px; }
  .tool-title { font-family: var(--sans); font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .tool-desc { color: var(--muted); font-size: 13px; line-height: 1.5; }

  /* ── Output area ── */
  #output {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-lg); min-height: 300px;
    overflow: hidden;
  }

  .output-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: #f87171; }
  .dot-y { background: #fbbf24; }
  .dot-g { background: var(--accent); }
  .output-path { font-size: 12px; color: var(--muted); margin-left: 4px; }

  .output-body { padding: 24px; }

  /* ── States ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 60px 20px; text-align: center; color: var(--muted);
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 300px; }

  .loading-state { display: flex; flex-direction: column; gap: 8px; padding: 24px; }
  .skeleton {
    height: 14px; background: var(--bg3); border-radius: 4px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ── Result cards ── */
  .result-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }

  .stat-card {
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-family: var(--sans); font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.warn   { color: var(--warn); }
  .stat-value.danger { color: var(--danger); }
  .stat-value.safe   { color: var(--safe); }

  .section { margin-bottom: 20px; }
  .section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--muted); margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .kv-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .kv-row:last-child { border-bottom: none; }
  .kv-key { color: var(--muted); }
  .kv-val { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; word-break: break-all; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
  }
  .badge-success { background: #052e1f; color: var(--safe); border: 1px solid #0f6e56; }
  .badge-warn    { background: #2d1f00; color: var(--warn); border: 1px solid #854f0b; }
  .badge-danger  { background: #2d0a0a; color: var(--danger); border: 1px solid #a32d2d; }
  .badge-info    { background: #0a1628; color: #93c5fd; border: 1px solid #1e40af; }
  .badge-neutral { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
  }
  .tag.highlight { border-color: var(--accent2); color: var(--accent2); background: #1a1040; }

  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar-label { font-size: 12px; color: var(--muted); width: 100px; flex-shrink: 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 3px; background: var(--accent2); transition: width 0.6s cubic-bezier(0.25,1,0.5,1); }
  .bar-count { font-size: 12px; color: var(--muted); min-width: 30px; text-align: right; }

  .finding-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.4;
  }
  .finding-row:last-child { border-bottom: none; }
  .finding-icon { flex-shrink: 0; font-size: 15px; margin-top: 1px; }

  .score-ring-wrap { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
  .score-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
  .score-ring svg { width: 80px; height: 80px; }
  .score-num {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: var(--sans); font-size: 20px; font-weight: 700;
  }

  .error-box {
    background: #1a0a0a; border: 1px solid #a32d2d; border-radius: var(--radius);
    padding: 16px; font-size: 13px; color: var(--danger); line-height: 1.5;
  }

  /* ── Bottom toolbar ── */
  .bottom-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; border-top: 1px solid var(--border);
    background: var(--bg3); font-size: 12px; color: var(--muted);
  }
  .copy-btn {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    padding: 4px 12px; border-radius: 5px; cursor: pointer; font-family: var(--mono);
    font-size: 12px; transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Quick presets ── */
  .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .preset-btn {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    padding: 5px 12px; border-radius: 20px; cursor: pointer; font-family: var(--mono);
    font-size: 12px; transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Cursor blink ── */
  .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); margin-left: 2px; animation: blink 1s step-end infinite; vertical-align: middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">G</div>
  <div>
    <div class="logo-text">Repo Analyzer</div>
    <div class="logo-sub">GitHub MCP · 6 tools</div>
  </div>
  <div class="header-right">
    <div class="version-pill">v1.0.0</div>
    <div class="version-pill" id="token-status" style="cursor:pointer" onclick="promptToken()">&#x2022; no token</div>
  </div>
</header>

<div class="layout">
  <aside>
    <div class="sidebar-label">Tools</div>

    <button class="tool-btn active" data-tool="analyze_repo_structure" onclick="selectTool(this)">
      <div class="tool-icon">&#x25A6;</div>
      <span>Structure</span>
    </button>
    <button class="tool-btn" data-tool="get_repo_insights" onclick="selectTool(this)">
      <div class="tool-icon">&#x2737;</div>
      <span>Insights</span>
    </button>
    <button class="tool-btn" data-tool="get_license_details" onclick="selectTool(this)">
      <div class="tool-icon">&#x2756;</div>
      <span>License</span>
    </button>
    <button class="tool-btn" data-tool="detect_libraries" onclick="selectTool(this)">
      <div class="tool-icon">&#x229E;</div>
      <span>Dependencies</span>
    </button>
    <button class="tool-btn" data-tool="security_check" onclick="selectTool(this)">
      <div class="tool-icon">&#x26D4;</div>
      <span>Security</span>
    </button>
    <button class="tool-btn" data-tool="explain_nn" onclick="selectTool(this)">
      <div class="tool-icon">&#x2605;</div>
      <span>Neural Net</span>
    </button>

    <div style="margin-top:24px; padding: 0 20px;">
      <div class="sidebar-label" style="padding-left:0">History</div>
      <div id="history-list" style="display:flex;flex-direction:column;gap:4px;"></div>
    </div>
  </aside>

  <main>
    <div class="tool-header">
      <div class="tool-title" id="tool-title">Repository Structure</div>
      <div class="tool-desc" id="tool-desc">Traverse files and folders — file-type distribution, total counts, key directories.</div>
    </div>

    <div class="search-bar">
      <div class="repo-prefix">github.com / <span>&nbsp;</span></div>
      <input id="repo-input" type="text" placeholder="owner/repo" autocomplete="off" spellcheck="false">
      <button class="run-btn" id="run-btn" onclick="runTool()">Run &#x25B6;</button>
    </div>

    <div class="presets" id="presets">
      <span style="font-size:12px;color:var(--muted);align-self:center">try:</span>
      <button class="preset-btn" onclick="setPreset('facebook/react')">facebook/react</button>
      <button class="preset-btn" onclick="setPreset('keras-team/keras')">keras-team/keras</button>
      <button class="preset-btn" onclick="setPreset('expressjs/express')">expressjs/express</button>
      <button class="preset-btn" onclick="setPreset('torvalds/linux')">torvalds/linux</button>
    </div>

    <div id="output">
      <div class="output-topbar">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <span class="output-path" id="output-path">~ awaiting input</span>
      </div>
      <div class="output-body" id="output-body">
        <div class="empty-state">
          <div class="empty-icon">&#x25B7;</div>
          <p>Enter a GitHub repository above and run a tool to see results here.</p>
        </div>
      </div>
      <div class="bottom-bar">
        <span id="status-text">ready</span>
        <button class="copy-btn" onclick="copyResult()">copy JSON</button>
      </div>
    </div>
  </main>
</div>

<script>
const TOOL_META = {
  analyze_repo_structure: {
    title: 'Repository structure',
    desc: 'Traverse files and folders — file-type distribution, total counts, key directories.'
  },
  get_repo_insights: {
    title: 'Repo insights',
    desc: 'Main language, complexity score, presence of tests, docs, CI, and Docker.'
  },
  get_license_details: {
    title: 'License details',
    desc: 'Detect license, classify as Permissive or Copyleft, show usage implications.'
  },
  detect_libraries: {
    title: 'Dependencies',
    desc: 'Parse package.json / requirements.txt and highlight major frameworks.'
  },
  security_check: {
    title: 'Security check',
    desc: 'Rate the repo Safe / Caution / Risky based on license, scripts, and activity.'
  },
  explain_nn: {
    title: 'Neural network detection',
    desc: 'Scan for ML frameworks (TensorFlow, PyTorch, Keras) and describe the architecture.'
  }
};

let currentTool = 'analyze_repo_structure';
let lastResult   = null;
let githubToken  = localStorage.getItem('gh_token') || '';
let history      = [];

if (githubToken) updateTokenStatus(true);

document.getElementById('repo-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') runTool();
});

function selectTool(btn) {
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTool = btn.dataset.tool;
  const meta = TOOL_META[currentTool];
  document.getElementById('tool-title').textContent = meta.title;
  document.getElementById('tool-desc').textContent  = meta.desc;
  showEmpty();
}

function setPreset(repo) {
  document.getElementById('repo-input').value = repo;
}

function promptToken() {
  const t = prompt('Paste your GitHub personal access token (stored locally only):');
  if (t && t.trim()) {
    githubToken = t.trim();
    localStorage.setItem('gh_token', githubToken);
    updateTokenStatus(true);
  }
}

function updateTokenStatus(has) {
  const el = document.getElementById('token-status');
  el.textContent = has ? '&#x2022; token set' : '&#x2022; no token';
  el.innerHTML   = has ? '&#x2022;&nbsp;token set' : '&#x2022;&nbsp;no token';
  el.style.color = has ? 'var(--safe)' : 'var(--muted)';
}

function showEmpty() {
  document.getElementById('output-body').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">&#x25B7;</div>
      <p>Enter a GitHub repository above and run a tool to see results here.</p>
    </div>`;
  document.getElementById('output-path').textContent = '~ awaiting input';
  document.getElementById('status-text').textContent = 'ready';
}

function showLoading(repo) {
  document.getElementById('output-path').textContent = `~ ${repo}`;
  document.getElementById('status-text').textContent  = 'fetching...';
  document.getElementById('output-body').innerHTML = `
    <div class="loading-state">
      ${[1,.8,.6,.9,.7].map(w=>`<div class="skeleton" style="width:${w*100}%"></div>`).join('')}
      <div style="margin-top:8px;color:var(--muted);font-size:12px">Calling GitHub API<span class="cursor"></span></div>
    </div>`;
  document.getElementById('run-btn').disabled = true;
}

function showError(msg) {
  document.getElementById('output-body').innerHTML = `<div style="padding:8px"><div class="error-box">&#x2717; ${msg}</div></div>`;
  document.getElementById('status-text').textContent = 'error';
  document.getElementById('run-btn').disabled = false;
}

async function runTool() {
  const repo = document.getElementById('repo-input').value.trim();
  if (!repo || !repo.includes('/')) { alert('Enter a repo as owner/repo'); return; }

  showLoading(repo);
  lastResult = null;

  try {
    let result;
    switch (currentTool) {
      case 'analyze_repo_structure': result = await analyzeStructure(repo); break;
      case 'get_repo_insights':      result = await getInsights(repo); break;
      case 'get_license_details':    result = await getLicense(repo); break;
      case 'detect_libraries':       result = await getDependencies(repo); break;
      case 'security_check':         result = await securityCheck(repo); break;
      case 'explain_nn':             result = await explainNN(repo); break;
    }
    lastResult = result;
    renderResult(result);
    addHistory(repo);
    document.getElementById('status-text').textContent = 'done · ' + new Date().toLocaleTimeString();
  } catch(e) {
    showError(e.message || 'Unknown error');
  }
  document.getElementById('run-btn').disabled = false;
}

/* ── GitHub API helpers ── */
async function ghGet(path) {
  const headers = { 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
  if (githubToken) headers['Authorization'] = `Bearer ${githubToken}`;
  const res = await fetch(`https://api.github.com${path}`, { headers });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || `GitHub API error ${res.status}`);
  }
  return res.json();
}

async function getTree(owner, repo) {
  const r = await ghGet(`/repos/${owner}/${repo}`);
  const branch = r.default_branch || 'main';
  const tree = await ghGet(`/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`);
  return { repoMeta: r, files: tree.tree || [] };
}

function parseRepo(repo) {
  const [owner, name] = repo.split('/');
  if (!owner || !name) throw new Error('Invalid repo format. Use owner/repo');
  return { owner, name };
}

/* ── Tool implementations ── */
async function analyzeStructure(repo) {
  const { owner, name } = parseRepo(repo);
  const { files } = await getTree(owner, name);

  const blobs = files.filter(f => f.type === 'blob');
  const trees = files.filter(f => f.type === 'tree');

  const extCount = {};
  for (const f of blobs) {
    const dot = f.path.lastIndexOf('.');
    const ext = dot !== -1 ? f.path.slice(dot+1).toLowerCase() : 'no-ext';
    extCount[ext] = (extCount[ext] || 0) + 1;
  }

  const topDirs = [...new Set(trees.map(d => d.path.split('/')[0]).filter(Boolean))].slice(0,12);
  const largest = [...blobs].sort((a,b)=>(b.size||0)-(a.size||0)).slice(0,5)
    .map(f => ({ path: f.path, sizeKb: Math.round((f.size||0)/102.4)/10 }));

  return { type:'structure', totalFiles: blobs.length, totalDirectories: trees.length, fileTypeDistribution: extCount, keyDirectories: topDirs, largestFiles: largest };
}

async function getInsights(repo) {
  const { owner, name } = parseRepo(repo);
  const { repoMeta, files } = await getTree(owner, name);

  const EXT_LANG = { ts:'TypeScript',tsx:'TypeScript',js:'JavaScript',jsx:'JavaScript',mjs:'JavaScript',py:'Python',rb:'Ruby',go:'Go',java:'Java',kt:'Kotlin',cs:'C#',cpp:'C++',rs:'Rust',php:'PHP',swift:'Swift',r:'R',scala:'Scala' };
  const blobs = files.filter(f => f.type === 'blob');
  const paths = blobs.map(f => f.path.toLowerCase());
  const totalSize = blobs.reduce((s,f)=>s+(f.size||0),0);

  const langCount = {};
  for (const f of blobs) {
    const dot = f.path.lastIndexOf('.'); if (dot===-1) continue;
    const lang = EXT_LANG[f.path.slice(dot+1).toLowerCase()];
    if (lang) langCount[lang] = (langCount[lang]||0)+1;
  }

  const total = Object.values(langCount).reduce((a,b)=>a+b,0)||1;
  const langPct = Object.fromEntries(Object.entries(langCount).map(([l,c])=>[l,Math.round(c/total*100)]));
  const mainLanguage = Object.entries(langCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||'Unknown';

  const count = blobs.length;
  const complexity = count > 300 || totalSize > 5e6 ? 'High' : count > 80 || totalSize > 5e5 ? 'Medium' : 'Low';
  const hasTests    = paths.some(p=>p.includes('test')||p.includes('spec'));
  const hasDocs     = paths.some(p=>p.includes('readme')||p.startsWith('docs/')||p.endsWith('.md'));
  const hasCI       = paths.some(p=>p.includes('.github/workflows')||p.includes('.travis'));
  const hasDocker   = paths.some(p=>p.endsWith('dockerfile'));

  return { type:'insights', mainLanguage, languageBreakdown: langPct, complexity, hasTests, hasDocs, hasCI, hasDockerfile: hasDocker, stars: repoMeta.stargazers_count, forks: repoMeta.forks_count, openIssues: repoMeta.open_issues_count };
}

async function getLicense(repo) {
  const { owner, name } = parseRepo(repo);
  const LICENSE_META = {
    'MIT':{ type:'Permissive', commercial:true, shareSource:false, attr:true, note:'Very permissive. Keep the copyright notice.' },
    'Apache-2.0':{ type:'Permissive', commercial:true, shareSource:false, attr:true, note:'Permissive with patent protection.' },
    'GPL-2.0':{ type:'Copyleft', commercial:true, shareSource:true, attr:true, note:'Derivatives must also be GPL-2.0.' },
    'GPL-3.0':{ type:'Copyleft', commercial:true, shareSource:true, attr:true, note:'Strong copyleft with patent protection.' },
    'AGPL-3.0':{ type:'Copyleft', commercial:true, shareSource:true, attr:true, note:'Network use triggers share-alike. Avoid in SaaS.' },
    'LGPL-2.1':{ type:'Copyleft', commercial:true, shareSource:false, attr:true, note:'Weak copyleft. Can link from proprietary code.' },
    'BSD-2-Clause':{ type:'Permissive', commercial:true, shareSource:false, attr:true, note:'Similar to MIT.' },
    'BSD-3-Clause':{ type:'Permissive', commercial:true, shareSource:false, attr:true, note:'Prohibits name-endorsement.' },
    'ISC':{ type:'Permissive', commercial:true, shareSource:false, attr:true, note:'Functionally identical to MIT.' },
    'MPL-2.0':{ type:'Copyleft', commercial:true, shareSource:false, attr:true, note:'File-level copyleft.' },
    'CC0-1.0':{ type:'Permissive', commercial:true, shareSource:false, attr:false, note:'Public domain. No restrictions.' },
  };
  try {
    const res = await ghGet(`/repos/${owner}/${name}/license`);
    const spdx = res.license?.spdx_id;
    const name_ = res.license?.name || 'Unknown';
    const meta  = spdx ? LICENSE_META[spdx] : null;
    return { type:'license', found:true, licenseName: name_, spdxId: spdx, ...(meta||{ type:'Unknown', commercial:false, shareSource:false, attr:true, note:'Review manually.' }) };
  } catch(e) {
    if (e.message?.includes('404')) return { type:'license', found:false, licenseName:'None', spdxId:null, type_:'Unknown', commercial:false, shareSource:false, attr:false, note:'No license. All rights reserved.' };
    throw e;
  }
}

async function getDependencies(repo) {
  const { owner, name } = parseRepo(repo);
  const { files } = await getTree(owner, name);
  const paths = files.map(f => f.path.toLowerCase());

  const MAJOR = ['react','vue','angular','next','nuxt','svelte','express','fastify','nestjs','django','flask','fastapi','tensorflow','torch','keras','sklearn','rails','gin','actix'];

  async function fetchFile(p) {
    try {
      const r = await ghGet(`/repos/${owner}/${name}/contents/${p}`);
      return r.encoding==='base64' ? atob(r.content.replace(/\n/g,'')) : r.content;
    } catch { return null; }
  }

  if (paths.includes('package.json')) {
    const raw = await fetchFile('package.json');
    if (raw) {
      const pkg = JSON.parse(raw);
      const deps    = Object.keys(pkg.dependencies||{});
      const devDeps = Object.keys(pkg.devDependencies||{});
      const all = [...deps,...devDeps].map(d=>d.toLowerCase());
      return { type:'deps', ecosystem:'Node.js (npm)', totalDependencies: deps.length+devDeps.length, dependencies: deps, devDependencies: devDeps, majorFrameworks: MAJOR.filter(f=>all.some(d=>d.includes(f))), packageFile:'package.json' };
    }
  }
  if (paths.includes('requirements.txt')) {
    const raw = await fetchFile('requirements.txt');
    if (raw) {
      const deps = raw.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#')).map(l=>l.split(/[>=<!]/)[0].trim().toLowerCase());
      return { type:'deps', ecosystem:'Python (pip)', totalDependencies: deps.length, dependencies: deps, devDependencies: [], majorFrameworks: MAJOR.filter(f=>deps.some(d=>d.includes(f))), packageFile:'requirements.txt' };
    }
  }
  if (paths.includes('go.mod')) {
    const raw = await fetchFile('go.mod');
    if (raw) {
      const deps = [...raw.matchAll(/^\s+([^\s]+)\s+v[\d.]+/gm)].map(m=>m[1]);
      return { type:'deps', ecosystem:'Go (modules)', totalDependencies: deps.length, dependencies: deps, devDependencies: [], majorFrameworks: MAJOR.filter(f=>deps.some(d=>d.includes(f))), packageFile:'go.mod' };
    }
  }
  return { type:'deps', ecosystem:'Unknown', totalDependencies:0, dependencies:[], devDependencies:[], majorFrameworks:[], packageFile:'none' };
}

async function securityCheck(repo) {
  const { owner, name } = parseRepo(repo);
  const [repoMeta, treeData] = await Promise.all([ghGet(`/repos/${owner}/${name}`), getTree(owner,name)]);

  let score = 100; const findings = [];
  if (!repoMeta.license) { findings.push({ icon:'🚨', text:'No license — all rights reserved by default' }); score -= 25; }
  else { findings.push({ icon:'✅', text:`License: ${repoMeta.license.name}` }); }

  const days = repoMeta.pushed_at ? Math.floor((Date.now()-new Date(repoMeta.pushed_at).getTime())/86400000) : 9999;
  const stars = repoMeta.stargazers_count||0;
  if (stars < 5 && days > 365) { findings.push({ icon:'⚠️', text:`Very low activity: ${stars} stars, last push ${days} days ago` }); score -= 15; }
  else { findings.push({ icon:'✅', text:`Active: ${stars.toLocaleString()} stars, last push ${days}d ago` }); }

  const envFiles = treeData.files.filter(f=>f.type==='blob'&&/(?:^|\/)\.env/.test(f.path));
  if (envFiles.length) { findings.push({ icon:'🚨', text:`Possible secrets committed: ${envFiles.map(f=>f.path).join(', ')}` }); score -= 20; }
  else { findings.push({ icon:'✅', text:'No .env files committed' }); }

  if (repoMeta.archived) { findings.push({ icon:'⚠️', text:'Repository is archived — no longer maintained' }); score -= 10; }

  score = Math.max(0,Math.min(100,score));
  const rating = score>=70?'Safe':score>=40?'Caution':'Risky';
  return { type:'security', rating, score, findings };
}

async function explainNN(repo) {
  const { owner, name } = parseRepo(repo);
  const { files } = await getTree(owner, name);

  const FW = { tensorflow:'TensorFlow', 'import torch':'PyTorch', 'torch.nn':'PyTorch', keras:'Keras', sklearn:'scikit-learn', 'huggingface':'Hugging Face', transformers:'Transformers', jax:'JAX', mxnet:'MXNet' };
  const ARCH = [
    { re:/Conv2D|nn\.Conv/i, label:'CNN', note:'Convolutional layers — image processing.' },
    { re:/LSTM|GRU|nn\.LSTM/i, label:'RNN/LSTM', note:'Recurrent layers — sequences, time series, text.' },
    { re:/Transformer|MultiHeadAttention/i, label:'Transformer', note:'Attention-based — NLP or generative AI.' },
    { re:/GAN|Discriminator|Generator/i, label:'GAN', note:'Generative adversarial — image synthesis.' },
    { re:/diffusion|UNet/i, label:'Diffusion', note:'Diffusion model — image generation.' },
    { re:/reinforcement|DQN|ReplayBuffer/i, label:'RL', note:'Reinforcement learning — agent training.' },
  ];

  const codeExts = new Set(['py','js','ts','ipynb','r','jl']);
  const codeFiles = files.filter(f=>{
    if (f.type!=='blob') return false;
    const dot = f.path.lastIndexOf('.'); const ext = dot!==-1?f.path.slice(dot+1).toLowerCase():'';
    return codeExts.has(ext) && (f.size||0)<200000;
  }).slice(0,20);

  const found = new Set(); const arch = [];

  async function fetchFile(p) {
    try { const r = await ghGet(`/repos/${owner}/${name}/contents/${p}`); return r.encoding==='base64'?atob(r.content.replace(/\n/g,'')):r.content||''; } catch { return ''; }
  }

  for (const f of codeFiles) {
    const content = await fetchFile(f.path);
    for (const [kw,fw] of Object.entries(FW)) { if (content.toLowerCase().includes(kw.toLowerCase())) found.add(fw); }
    for (const a of ARCH) { if (a.re.test(content) && !arch.some(x=>x.label===a.label)) arch.push(a); }
  }

  const frameworks = [...found];
  if (!frameworks.length && !arch.length) return { type:'nn', detected:false, frameworks:[], architectureHints:[], explanation:'No neural network or ML framework detected.' };
  return { type:'nn', detected:true, frameworks, architectureHints: arch.map(a=>a.label), archDetails: arch, explanation: `ML code detected. Uses: ${frameworks.join(', ')||'unknown framework'}.` };
}

/* ── Renderers ── */
function renderResult(r) {
  let html = '';
  switch(r.type) {
    case 'structure': html = renderStructure(r); break;
    case 'insights':  html = renderInsights(r);  break;
    case 'license':   html = renderLicense(r);   break;
    case 'deps':      html = renderDeps(r);       break;
    case 'security':  html = renderSecurity(r);  break;
    case 'nn':        html = renderNN(r);         break;
  }
  document.getElementById('output-body').innerHTML = html;
  requestAnimationFrame(()=>{ document.querySelectorAll('.bar-fill[data-w]').forEach(el=>{ el.style.width=el.dataset.w+'%'; }); });
}

function renderStructure(r) {
  const extEntries = Object.entries(r.fileTypeDistribution).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max = extEntries[0]?.[1]||1;
  return `
    <div class="result-grid">
      <div class="stat-card"><div class="stat-label">Total files</div><div class="stat-value accent">${r.totalFiles.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Directories</div><div class="stat-value">${r.totalDirectories.toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">File types</div><div class="stat-value">${Object.keys(r.fileTypeDistribution).length}</div></div>
    </div>
    <div class="section">
      <div class="section-title">File type distribution</div>
      ${extEntries.map(([ext,cnt])=>`
        <div class="bar-row">
          <div class="bar-label">.${ext}</div>
          <div class="bar-track"><div class="bar-fill" data-w="${Math.round(cnt/max*100)}" style="width:0%"></div></div>
          <div class="bar-count">${cnt}</div>
        </div>`).join('')}
    </div>
    <div class="section">
      <div class="section-title">Key directories</div>
      <div class="tag-list">${r.keyDirectories.map(d=>`<span class="tag">${d}/</span>`).join('')}</div>
    </div>
    <div class="section">
      <div class="section-title">Largest files</div>
      ${r.largestFiles.map(f=>`<div class="kv-row"><span class="kv-key" style="font-size:12px;max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.path}</span><span class="kv-val">${f.sizeKb} KB</span></div>`).join('')}
    </div>`;
}

function renderInsights(r) {
  const langEntries = Object.entries(r.languageBreakdown).sort((a,b)=>b[1]-a[1]);
  const complexColor = r.complexity==='Low'?'safe':r.complexity==='Medium'?'warn':'danger';
  return `
    <div class="result-grid">
      <div class="stat-card"><div class="stat-label">Main language</div><div class="stat-value accent" style="font-size:16px">${r.mainLanguage}</div></div>
      <div class="stat-card"><div class="stat-label">Complexity</div><div class="stat-value ${complexColor}">${r.complexity}</div></div>
      <div class="stat-card"><div class="stat-label">Stars</div><div class="stat-value">${(r.stars||0).toLocaleString()}</div></div>
      <div class="stat-card"><div class="stat-label">Open issues</div><div class="stat-value">${(r.openIssues||0).toLocaleString()}</div></div>
    </div>
    <div class="section">
      <div class="section-title">Language breakdown</div>
      ${langEntries.map(([l,p])=>`
        <div class="bar-row">
          <div class="bar-label">${l}</div>
          <div class="bar-track"><div class="bar-fill" data-w="${p}" style="width:0%"></div></div>
          <div class="bar-count">${p}%</div>
        </div>`).join('')}
    </div>
    <div class="section">
      <div class="section-title">Project health</div>
      <div class="kv-row"><span class="kv-key">Tests</span><span class="kv-val">${badge(r.hasTests,'Yes','No')}</span></div>
      <div class="kv-row"><span class="kv-key">Documentation</span><span class="kv-val">${badge(r.hasDocs,'Yes','No')}</span></div>
      <div class="kv-row"><span class="kv-key">CI pipeline</span><span class="kv-val">${badge(r.hasCI,'Yes','No')}</span></div>
      <div class="kv-row"><span class="kv-key">Dockerfile</span><span class="kv-val">${badge(r.hasDockerfile,'Yes','No')}</span></div>
    </div>`;
}

function renderLicense(r) {
  const tc = r.type==='Permissive'?'badge-success':r.type==='Copyleft'?'badge-warn':'badge-danger';
  return `
    <div class="section">
      <div class="section-title">License</div>
      <div class="kv-row"><span class="kv-key">Name</span><span class="kv-val" style="color:var(--accent);font-size:15px">${r.licenseName}</span></div>
      <div class="kv-row"><span class="kv-key">SPDX ID</span><span class="kv-val">${r.spdxId||'—'}</span></div>
      <div class="kv-row"><span class="kv-key">Type</span><span class="kv-val"><span class="badge ${tc}">${r.type}</span></span></div>
    </div>
    <div class="section">
      <div class="section-title">Usage rights</div>
      <div class="kv-row"><span class="kv-key">Commercial use</span><span class="kv-val">${badge(r.commercial,'Allowed','Restricted')}</span></div>
      <div class="kv-row"><span class="kv-key">Must share source</span><span class="kv-val">${badge(!r.shareSource,'No','Yes','warn')}</span></div>
      <div class="kv-row"><span class="kv-key">Attribution required</span><span class="kv-val">${r.attr?'<span class="badge badge-info">Yes</span>':'<span class="badge badge-neutral">No</span>'}</span></div>
    </div>
    <div class="section">
      <div class="section-title">Implications</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.6">${r.note}</p>
    </div>`;
}

function renderDeps(r) {
  const allDeps = r.dependencies.slice(0,40);
  return `
    <div class="result-grid">
      <div class="stat-card"><div class="stat-label">Ecosystem</div><div class="stat-value accent" style="font-size:14px">${r.ecosystem}</div></div>
      <div class="stat-card"><div class="stat-label">Total deps</div><div class="stat-value">${r.totalDependencies}</div></div>
      <div class="stat-card"><div class="stat-label">Dev deps</div><div class="stat-value">${r.devDependencies.length}</div></div>
    </div>
    ${r.majorFrameworks.length?`
    <div class="section">
      <div class="section-title">Major frameworks detected</div>
      <div class="tag-list">${r.majorFrameworks.map(f=>`<span class="tag highlight">${f}</span>`).join('')}</div>
    </div>`:''}
    <div class="section">
      <div class="section-title">Runtime dependencies (${r.dependencies.length})</div>
      <div class="tag-list">${allDeps.map(d=>`<span class="tag">${d}</span>`).join('')}${r.dependencies.length>40?`<span class="tag" style="color:var(--muted)">+${r.dependencies.length-40} more</span>`:''}</div>
    </div>
    ${r.devDependencies.length?`
    <div class="section">
      <div class="section-title">Dev dependencies (${r.devDependencies.length})</div>
      <div class="tag-list">${r.devDependencies.slice(0,20).map(d=>`<span class="tag" style="color:var(--muted)">${d}</span>`).join('')}</div>
    </div>`:''}`;
}

function renderSecurity(r) {
  const ratingColor = r.rating==='Safe'?'#34d399':r.rating==='Caution'?'#fbbf24':'#f87171';
  const dash = 2*Math.PI*32; const used = dash*(1-r.score/100);
  return `
    <div class="score-ring-wrap">
      <div class="score-ring">
        <svg viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="32" fill="none" stroke="var(--border)" stroke-width="6"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="${ratingColor}" stroke-width="6"
            stroke-dasharray="${dash.toFixed(1)}" stroke-dashoffset="${used.toFixed(1)}"
            stroke-linecap="round" transform="rotate(-90 40 40)"/>
        </svg>
        <div class="score-num" style="color:${ratingColor}">${r.score}</div>
      </div>
      <div>
        <div style="font-family:var(--sans);font-size:20px;font-weight:700;color:${ratingColor}">${r.rating}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">${r.findings.length} checks completed</div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Findings</div>
      ${r.findings.map(f=>`
        <div class="finding-row">
          <div class="finding-icon">${f.icon}</div>
          <div style="font-size:13px;color:var(--text)">${f.text}</div>
        </div>`).join('')}
    </div>`;
}

function renderNN(r) {
  if (!r.detected) return `
    <div class="empty-state">
      <div class="empty-icon">&#x25CB;</div>
      <p style="color:var(--muted)">${r.explanation}</p>
    </div>`;
  return `
    <div class="result-grid">
      <div class="stat-card"><div class="stat-label">ML detected</div><div class="stat-value safe">Yes</div></div>
      <div class="stat-card"><div class="stat-label">Frameworks</div><div class="stat-value accent">${r.frameworks.length}</div></div>
      <div class="stat-card"><div class="stat-label">Architecture hints</div><div class="stat-value">${r.architectureHints.length}</div></div>
    </div>
    <div class="section">
      <div class="section-title">Frameworks</div>
      <div class="tag-list">${r.frameworks.map(f=>`<span class="tag highlight">${f}</span>`).join('')}</div>
    </div>
    ${r.archDetails?.length?`
    <div class="section">
      <div class="section-title">Architecture patterns</div>
      ${r.archDetails.map(a=>`
        <div class="kv-row">
          <span class="kv-key">${a.label}</span>
          <span class="kv-val" style="font-size:12px;color:var(--muted);text-align:right">${a.note}</span>
        </div>`).join('')}
    </div>`:''}`;
}

function badge(ok, yesLabel, noLabel, warnOnFalse) {
  if (ok) return `<span class="badge badge-success">${yesLabel}</span>`;
  return `<span class="badge ${warnOnFalse?'badge-warn':'badge-danger'}">${noLabel}</span>`;
}

function addHistory(repo) {
  history = [repo, ...history.filter(r=>r!==repo)].slice(0,6);
  const el = document.getElementById('history-list');
  el.innerHTML = history.map(r=>`
    <button class="preset-btn" style="text-align:left;border-radius:5px;padding:5px 8px;font-size:11px;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="setPreset('${r}')">${r}</button>
  `).join('');
}

function copyResult() {
  if (!lastResult) return;
  navigator.clipboard.writeText(JSON.stringify(lastResult, null, 2)).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'copied!'; btn.style.color='var(--safe)';
    setTimeout(()=>{ btn.textContent='copy JSON'; btn.style.color=''; }, 1500);
  });
}
